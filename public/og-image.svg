<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient - deep ocean -->
  <defs>
    <linearGradient id="oceanGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a2540"/>
      <stop offset="50%" style="stop-color:#061a2c"/>
      <stop offset="100%" style="stop-color:#03101e"/>
    </linearGradient>
    <linearGradient id="tealGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#38e8c6;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#38e8c6;stop-opacity:0.2"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="url(#oceanGradient)"/>

  <!-- Subtle caustic rays at top -->
  <g opacity="0.1">
    <path d="M 100 0 Q 150 100 80 250 T 120 630" stroke="#7fdbff" stroke-width="2" fill="none"/>
    <path d="M 300 0 Q 250 120 340 280 T 300 630" stroke="#7fdbff" stroke-width="2" fill="none"/>
    <path d="M 500 0 Q 550 110 460 260 T 520 630" stroke="#7fdbff" stroke-width="2" fill="none"/>
    <path d="M 700 0 Q 650 100 740 240 T 700 630" stroke="#7fdbff" stroke-width="2" fill="none"/>
    <path d="M 900 0 Q 950 120 860 270 T 920 630" stroke="#7fdbff" stroke-width="2" fill="none"/>
    <path d="M 1100 0 Q 1050 100 1140 250 T 1100 630" stroke="#7fdbff" stroke-width="2" fill="none"/>
  </g>

  <!-- Sonar arc pattern - subtle background texture -->
  <g opacity="0.08">
    <circle cx="600" cy="630" r="200" stroke="#38e8c6" stroke-width="1" fill="none"/>
    <circle cx="600" cy="630" r="300" stroke="#38e8c6" stroke-width="1" fill="none"/>
    <circle cx="600" cy="630" r="400" stroke="#38e8c6" stroke-width="1" fill="none"/>
    <circle cx="600" cy="630" r="500" stroke="#38e8c6" stroke-width="1" fill="none"/>
  </g>

  <!-- Submarine silhouette - bottom left, subtle -->
  <g opacity="0.15" fill="#38e8c6">
    <ellipse cx="150" cy="520" rx="120" ry="25"/>
    <path d="M 200 495 L 220 485 L 280 485 L 295 495 Z"/>
    <circle cx="270" cy="520" r="3"/>
  </g>

  <!-- Main content - centered -->
  <g text-anchor="center">
    <!-- Name -->
    <text x="600" y="220" font-family="Inter, system-ui, sans-serif" font-size="72" font-weight="600" fill="#f1f5f9" letter-spacing="-1">
      Andrés Pino
    </text>

    <!-- Title -->
    <text x="600" y="290" font-family="JetBrains Mono, monospace" font-size="28" fill="#38e8c6" letter-spacing="2">
      SENIOR ELECTRICAL &amp; SYSTEMS ENGINEERING LEADER
    </text>

    <!-- Divider line with sonar motif -->
    <line x1="400" y1="340" x2="800" y2="340" stroke="#38e8c6" stroke-width="2" opacity="0.6"/>
    <circle cx="600" cy="340" r="8" fill="#38e8c6" opacity="0.8"/>
    <circle cx="600" cy="340" r="15" stroke="#38e8c6" stroke-width="1" opacity="0.4"/>

    <!-- Credentials -->
    <text x="600" y="390" font-family="JetBrains Mono, monospace" font-size="18" fill="#8aa0b4" letter-spacing="1">
      20 YEARS · TS CLEARANCE · ITAR/DoD · 4 PRIMES
    </text>

    <!-- Domain keywords -->
    <text x="600" y="440" font-family="Inter, system-ui, sans-serif" font-size="20" fill="#cbd5e1">
      Power Electronics · Sonar &amp; Acoustics · Undersea Systems · Directed Energy
    </text>
  </g>

  <!-- Bottom right - subtle bearing readout -->
  <g opacity="0.4">
    <text x="1050" y="580" font-family="JetBrains Mono, monospace" font-size="14" fill="#38e8c6" letter-spacing="3">
      BRG 270 · RNG 1500yd
    </text>
  </g>
</svg>
